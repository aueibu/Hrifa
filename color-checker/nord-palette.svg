<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" font-family="Menlo, Consolas, 'Courier New', monospace">
  <rect width="640" height="640" fill="#ECEFF4"/>

  <!-- Row 0: nord0-3 (Polar Night) -->
  <g>
    <rect x="20" y="20" width="130" height="130" fill="#2E3440"/>
    <text x="30" y="128" fill="#FFFFFF" font-size="15" font-weight="bold">nord0</text>
    <text x="30" y="145" fill="#FFFFFF" font-size="11">#2E3440</text>
  </g>
  <g>
    <rect x="170" y="20" width="130" height="130" fill="#3B4252"/>
    <text x="180" y="128" fill="#FFFFFF" font-size="15" font-weight="bold">nord1</text>
    <text x="180" y="145" fill="#FFFFFF" font-size="11">#3B4252</text>
  </g>
  <g>
    <rect x="320" y="20" width="130" height="130" fill="#434C5E"/>
    <text x="330" y="128" fill="#FFFFFF" font-size="15" font-weight="bold">nord2</text>
    <text x="330" y="145" fill="#FFFFFF" font-size="11">#434C5E</text>
  </g>
  <g>
    <rect x="470" y="20" width="130" height="130" fill="#4C566A"/>
    <text x="480" y="128" fill="#FFFFFF" font-size="15" font-weight="bold">nord3</text>
    <text x="480" y="145" fill="#FFFFFF" font-size="11">#4C566A</text>
  </g>

  <!-- Row 1: nord4-6 (Snow Storm) + nord7 (Frost) -->
  <g>
    <rect x="20" y="170" width="130" height="130" fill="#D8DEE9" stroke="#4C566A" stroke-width="1"/>
    <text x="30" y="278" fill="#1A1A1A" font-size="15" font-weight="bold">nord4</text>
    <text x="30" y="295" fill="#1A1A1A" font-size="11">#D8DEE9</text>
  </g>
  <g>
    <rect x="170" y="170" width="130" height="130" fill="#E5E9F0" stroke="#4C566A" stroke-width="1"/>
    <text x="180" y="278" fill="#1A1A1A" font-size="15" font-weight="bold">nord5</text>
    <text x="180" y="295" fill="#1A1A1A" font-size="11">#E5E9F0</text>
  </g>
  <g>
    <rect x="320" y="170" width="130" height="130" fill="#ECEFF4" stroke="#4C566A" stroke-width="1"/>
    <text x="330" y="278" fill="#1A1A1A" font-size="15" font-weight="bold">nord6</text>
    <text x="330" y="295" fill="#1A1A1A" font-size="11">#ECEFF4</text>
  </g>
  <g>
    <rect x="470" y="170" width="130" height="130" fill="#8FBCBB"/>
    <text x="480" y="278" fill="#1A1A1A" font-size="15" font-weight="bold">nord7</text>
    <text x="480" y="295" fill="#1A1A1A" font-size="11">#8FBCBB</text>
  </g>

  <!-- Row 2: nord8-10 (Frost) + nord11 (Aurora) -->
  <g>
    <rect x="20" y="320" width="130" height="130" fill="#88C0D0"/>
    <text x="30" y="428" fill="#1A1A1A" font-size="15" font-weight="bold">nord8</text>
    <text x="30" y="445" fill="#1A1A1A" font-size="11">#88C0D0</text>
  </g>
  <g>
    <rect x="170" y="320" width="130" height="130" fill="#81A1C1"/>
    <text x="180" y="428" fill="#1A1A1A" font-size="15" font-weight="bold">nord9</text>
    <text x="180" y="445" fill="#1A1A1A" font-size="11">#81A1C1</text>
  </g>
  <g>
    <rect x="320" y="320" width="130" height="130" fill="#5E81AC"/>
    <text x="330" y="428" fill="#FFFFFF" font-size="15" font-weight="bold">nord10</text>
    <text x="330" y="445" fill="#FFFFFF" font-size="11">#5E81AC</text>
  </g>
  <g>
    <rect x="470" y="320" width="130" height="130" fill="#BF616A"/>
    <text x="480" y="428" fill="#FFFFFF" font-size="15" font-weight="bold">nord11</text>
    <text x="480" y="445" fill="#FFFFFF" font-size="11">#BF616A</text>
  </g>

  <!-- Row 3: nord12-15 (Aurora) -->
  <g>
    <rect x="20" y="470" width="130" height="130" fill="#D08770"/>
    <text x="30" y="578" fill="#1A1A1A" font-size="15" font-weight="bold">nord12</text>
    <text x="30" y="595" fill="#1A1A1A" font-size="11">#D08770</text>
  </g>
  <g>
    <rect x="170" y="470" width="130" height="130" fill="#EBCB8B"/>
    <text x="180" y="578" fill="#1A1A1A" font-size="15" font-weight="bold">nord13</text>
    <text x="180" y="595" fill="#1A1A1A" font-size="11">#EBCB8B</text>
  </g>
  <g>
    <rect x="320" y="470" width="130" height="130" fill="#A3BE8C"/>
    <text x="330" y="578" fill="#1A1A1A" font-size="15" font-weight="bold">nord14</text>
    <text x="330" y="595" fill="#1A1A1A" font-size="11">#A3BE8C</text>
  </g>
  <g>
    <rect x="470" y="470" width="130" height="130" fill="#B48EAD"/>
    <text x="480" y="578" fill="#1A1A1A" font-size="15" font-weight="bold">nord15</text>
    <text x="480" y="595" fill="#1A1A1A" font-size="11">#B48EAD</text>
  </g>
</svg>
