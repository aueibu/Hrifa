<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="Menlo, Consolas, 'Courier New', monospace">
  <rect width="900" height="900" fill="#181816"/>

  <!-- Section 1: Core + Cool Accent -->
  <text x="20" y="30" fill="#ebdbb2" font-size="18" font-weight="bold">Core Accents + New Cool Accent</text>
  <g><rect x="20" y="50" width="100" height="90" fill="#fb4934"/>
    <text x="28" y="112" fill="#FFFFFF" font-size="12" font-weight="bold">red</text>
    <text x="28" y="128" fill="#FFFFFF" font-size="10">#fb4934</text></g>
  <g><rect x="130" y="50" width="100" height="90" fill="#b8bb26"/>
    <text x="138" y="112" fill="#1A1A1A" font-size="12" font-weight="bold">green</text>
    <text x="138" y="128" fill="#1A1A1A" font-size="10">#b8bb26</text></g>
  <g><rect x="240" y="50" width="100" height="90" fill="#fabd2f"/>
    <text x="248" y="112" fill="#1A1A1A" font-size="12" font-weight="bold">yellow</text>
    <text x="248" y="128" fill="#1A1A1A" font-size="10">#fabd2f</text></g>
  <g><rect x="350" y="50" width="100" height="90" fill="#83a598"/>
    <text x="358" y="112" fill="#1A1A1A" font-size="12" font-weight="bold">blue</text>
    <text x="358" y="128" fill="#1A1A1A" font-size="10">#83a598</text></g>
  <g><rect x="460" y="50" width="100" height="90" fill="#d3869b"/>
    <text x="468" y="112" fill="#1A1A1A" font-size="12" font-weight="bold">purple</text>
    <text x="468" y="128" fill="#1A1A1A" font-size="10">#d3869b</text></g>
  <g><rect x="570" y="50" width="100" height="90" fill="#8ec07c"/>
    <text x="578" y="112" fill="#1A1A1A" font-size="12" font-weight="bold">aqua</text>
    <text x="578" y="128" fill="#1A1A1A" font-size="10">#8ec07c</text></g>
  <g><rect x="680" y="50" width="100" height="90" fill="#fe8019"/>
    <text x="688" y="112" fill="#1A1A1A" font-size="12" font-weight="bold">orange</text>
    <text x="688" y="128" fill="#1A1A1A" font-size="10">#fe8019</text></g>
  <g><rect x="790" y="50" width="100" height="90" fill="#6c8eb0" stroke="#fbf1c7" stroke-width="2"/>
    <text x="798" y="112" fill="#FFFFFF" font-size="12" font-weight="bold">blue-new</text>
    <text x="798" y="128" fill="#FFFFFF" font-size="10">#6c8eb0</text></g>

  <!-- Section 2: Grays - near-neutral 3-step scale -->
  <text x="20" y="170" fill="#ebdbb2" font-size="18" font-weight="bold">Grays — near-neutral 3-step scale (~2-3% sat, vs. 12% taupe original)</text>
  <g><rect x="20" y="190" width="100" height="90" fill="#9d9b97"/>
    <text x="28" y="252" fill="#1A1A1A" font-size="12" font-weight="bold">Grey Olive</text>
    <text x="28" y="268" fill="#1A1A1A" font-size="10">#9d9b97</text></g>
  <g><rect x="130" y="190" width="100" height="90" fill="#41413e"/>
    <text x="138" y="252" fill="#FFFFFF" font-size="12" font-weight="bold">Charcoal Brown</text>
    <text x="138" y="268" fill="#FFFFFF" font-size="10">#41413e</text></g>
  <g><rect x="240" y="190" width="100" height="90" fill="#2c2c2a"/>
    <text x="248" y="252" fill="#FFFFFF" font-size="12" font-weight="bold">Graphite</text>
    <text x="248" y="268" fill="#FFFFFF" font-size="10">#2c2c2a</text></g>
  <text x="360" y="220" fill="#a89984" font-size="12">Much closer to true neutral than the warm-taupe</text>
  <text x="360" y="238" fill="#a89984" font-size="12">scale (12% sat, 30° hue) — these barely register</text>
  <text x="360" y="256" fill="#a89984" font-size="12">a color cast, so they read as "real" grays rather</text>
  <text x="360" y="274" fill="#a89984" font-size="12">than a tinted brown at low saturation.</text>

  <!-- Section 3: Softened Accents -->
  <text x="20" y="310" fill="#ebdbb2" font-size="18" font-weight="bold">Softened Accents (desaturated ~15-20%)</text>
  <g><rect x="20" y="330" width="100" height="90" fill="#c85450"/>
    <text x="28" y="392" fill="#FFFFFF" font-size="11" font-weight="bold">red-soft</text>
    <text x="28" y="408" fill="#FFFFFF" font-size="10">#c85450</text></g>
  <g><rect x="130" y="330" width="100" height="90" fill="#a3a355"/>
    <text x="138" y="392" fill="#1A1A1A" font-size="11" font-weight="bold">green-soft</text>
    <text x="138" y="408" fill="#1A1A1A" font-size="10">#a3a355</text></g>
  <g><rect x="240" y="330" width="100" height="90" fill="#d4ad55"/>
    <text x="248" y="392" fill="#1A1A1A" font-size="11" font-weight="bold">yellow-soft</text>
    <text x="248" y="408" fill="#1A1A1A" font-size="10">#d4ad55</text></g>
  <g><rect x="350" y="330" width="100" height="90" fill="#7c96a0"/>
    <text x="358" y="392" fill="#1A1A1A" font-size="11" font-weight="bold">blue-soft</text>
    <text x="358" y="408" fill="#1A1A1A" font-size="10">#7c96a0</text></g>
  <g><rect x="460" y="330" width="100" height="90" fill="#b58a9a"/>
    <text x="468" y="392" fill="#1A1A1A" font-size="11" font-weight="bold">purple-soft</text>
    <text x="468" y="408" fill="#1A1A1A" font-size="10">#b58a9a</text></g>
  <g><rect x="570" y="330" width="100" height="90" fill="#8aab7e"/>
    <text x="578" y="392" fill="#1A1A1A" font-size="11" font-weight="bold">aqua-soft</text>
    <text x="578" y="408" fill="#1A1A1A" font-size="10">#8aab7e</text></g>
  <g><rect x="680" y="330" width="100" height="90" fill="#cc8355"/>
    <text x="688" y="392" fill="#1A1A1A" font-size="11" font-weight="bold">orange-soft</text>
    <text x="688" y="408" fill="#1A1A1A" font-size="10">#cc8355</text></g>
  <g><rect x="790" y="330" width="100" height="90" fill="#8098ac" stroke="#fbf1c7" stroke-width="2"/>
    <text x="798" y="392" fill="#1A1A1A" font-size="11" font-weight="bold">blue-new-soft</text>
    <text x="798" y="408" fill="#1A1A1A" font-size="10">#8098ac</text></g>

  <!-- Section 4: Darkened / Jewel-tone Accents -->
  <text x="20" y="450" fill="#ebdbb2" font-size="18" font-weight="bold">Darkened "Jewel-tone" Accents (deep shades for emphasis/dark surfaces)</text>
  <g><rect x="20" y="470" width="100" height="90" fill="#5c1a1e"/>
    <text x="28" y="532" fill="#FFFFFF" font-size="11" font-weight="bold">oxblood</text>
    <text x="28" y="548" fill="#FFFFFF" font-size="10">#5c1a1e</text></g>
  <g><rect x="130" y="470" width="100" height="90" fill="#33472b"/>
    <text x="138" y="532" fill="#FFFFFF" font-size="11" font-weight="bold">hunter-green</text>
    <text x="138" y="548" fill="#FFFFFF" font-size="10">#33472b</text></g>
  <g><rect x="240" y="470" width="100" height="90" fill="#8a6a1f"/>
    <text x="248" y="532" fill="#FFFFFF" font-size="11" font-weight="bold">ochre</text>
    <text x="248" y="548" fill="#FFFFFF" font-size="10">#8a6a1f</text></g>
  <g><rect x="350" y="470" width="100" height="90" fill="#2a4147"/>
    <text x="358" y="532" fill="#FFFFFF" font-size="11" font-weight="bold">petrol</text>
    <text x="358" y="548" fill="#FFFFFF" font-size="10">#2a4147</text></g>
  <g><rect x="460" y="470" width="100" height="90" fill="#402038"/>
    <text x="468" y="532" fill="#FFFFFF" font-size="11" font-weight="bold">eggplant</text>
    <text x="468" y="548" fill="#FFFFFF" font-size="10">#402038</text></g>
  <g><rect x="570" y="470" width="100" height="90" fill="#2f4a3a"/>
    <text x="578" y="532" fill="#FFFFFF" font-size="11" font-weight="bold">pine</text>
    <text x="578" y="548" fill="#FFFFFF" font-size="10">#2f4a3a</text></g>
  <g><rect x="680" y="470" width="100" height="90" fill="#7a3a12"/>
    <text x="688" y="532" fill="#FFFFFF" font-size="11" font-weight="bold">burnt-orange</text>
    <text x="688" y="548" fill="#FFFFFF" font-size="10">#7a3a12</text></g>
  <g><rect x="790" y="470" width="100" height="90" fill="#2a3f52" stroke="#fbf1c7" stroke-width="2"/>
    <text x="798" y="532" fill="#FFFFFF" font-size="11" font-weight="bold">navy</text>
    <text x="798" y="548" fill="#FFFFFF" font-size="10">#2a3f52</text></g>

  <!-- Section 5: Extended Neutrals - dark ramp (smooth interpolation, #181816 to #7c6f64) -->
  <text x="20" y="590" fill="#ebdbb2" font-size="18" font-weight="bold">Extended Neutrals — dark ramp (smooth, 181816 → 7c6f64)</text>
  <g><rect x="20" y="610" width="100" height="80" fill="#181816"/>
    <text x="28" y="665" fill="#FFFFFF" font-size="10" font-weight="bold">bg0</text>
    <text x="28" y="680" fill="#FFFFFF" font-size="9">#181816</text></g>
  <g><rect x="130" y="610" width="100" height="80" fill="#262421"/>
    <text x="138" y="665" fill="#FFFFFF" font-size="10" font-weight="bold">bg1</text>
    <text x="138" y="680" fill="#FFFFFF" font-size="9">#262421</text></g>
  <g><rect x="240" y="610" width="100" height="80" fill="#35312c"/>
    <text x="248" y="665" fill="#FFFFFF" font-size="10" font-weight="bold">bg1_5</text>
    <text x="248" y="680" fill="#FFFFFF" font-size="9">#35312c</text></g>
  <g><rect x="350" y="610" width="100" height="80" fill="#433d37"/>
    <text x="358" y="665" fill="#FFFFFF" font-size="10" font-weight="bold">bg2</text>
    <text x="358" y="680" fill="#FFFFFF" font-size="9">#433d37</text></g>
  <g><rect x="460" y="610" width="100" height="80" fill="#514a43"/>
    <text x="468" y="665" fill="#FFFFFF" font-size="10" font-weight="bold">bg2_5</text>
    <text x="468" y="680" fill="#FFFFFF" font-size="9">#514a43</text></g>
  <g><rect x="570" y="610" width="100" height="80" fill="#5f564e"/>
    <text x="578" y="665" fill="#FFFFFF" font-size="10" font-weight="bold">bg3</text>
    <text x="578" y="680" fill="#FFFFFF" font-size="9">#5f564e</text></g>
  <g><rect x="680" y="610" width="100" height="80" fill="#6e6359"/>
    <text x="688" y="665" fill="#FFFFFF" font-size="10" font-weight="bold">bg3_5</text>
    <text x="688" y="680" fill="#FFFFFF" font-size="9">#6e6359</text></g>
  <g><rect x="790" y="610" width="100" height="80" fill="#7c6f64"/>
    <text x="798" y="665" fill="#FFFFFF" font-size="10" font-weight="bold">bg4</text>
    <text x="798" y="680" fill="#FFFFFF" font-size="9">#7c6f64</text></g>

  <!-- Section 6: Extended Neutrals - light ramp (smooth interpolation, paper to fg4) -->
  <text x="20" y="720" fill="#ebdbb2" font-size="18" font-weight="bold">Extended Neutrals — light ramp (smooth, paper → fg4)</text>
  <g><rect x="20" y="740" width="100" height="80" fill="#a89984"/>
    <text x="28" y="795" fill="#1A1A1A" font-size="10" font-weight="bold">fg4</text>
    <text x="28" y="810" fill="#1A1A1A" font-size="9">#a89984</text></g>
  <g><rect x="130" y="740" width="100" height="80" fill="#b4a693"/>
    <text x="138" y="795" fill="#1A1A1A" font-size="10" font-weight="bold">n6</text>
    <text x="138" y="810" fill="#1A1A1A" font-size="9">#b4a693</text></g>
  <g><rect x="240" y="740" width="100" height="80" fill="#bfb3a3"/>
    <text x="248" y="795" fill="#1A1A1A" font-size="10" font-weight="bold">n5</text>
    <text x="248" y="810" fill="#1A1A1A" font-size="9">#bfb3a3</text></g>
  <g><rect x="350" y="740" width="100" height="80" fill="#cbc0b2"/>
    <text x="358" y="795" fill="#1A1A1A" font-size="10" font-weight="bold">n4</text>
    <text x="358" y="810" fill="#1A1A1A" font-size="9">#cbc0b2</text></g>
  <g><rect x="460" y="740" width="100" height="80" fill="#d6cec2"/>
    <text x="468" y="795" fill="#1A1A1A" font-size="10" font-weight="bold">n3</text>
    <text x="468" y="810" fill="#1A1A1A" font-size="9">#d6cec2</text></g>
  <g><rect x="570" y="740" width="100" height="80" fill="#e2dbd1"/>
    <text x="578" y="795" fill="#1A1A1A" font-size="10" font-weight="bold">n2</text>
    <text x="578" y="810" fill="#1A1A1A" font-size="9">#e2dbd1</text></g>
  <g><rect x="680" y="740" width="100" height="80" fill="#ede8e1"/>
    <text x="688" y="795" fill="#1A1A1A" font-size="10" font-weight="bold">n1</text>
    <text x="688" y="810" fill="#1A1A1A" font-size="9">#ede8e1</text></g>
  <g><rect x="790" y="740" width="100" height="80" fill="#f9f5f0" stroke="#928374" stroke-width="1"/>
    <text x="798" y="795" fill="#1A1A1A" font-size="10" font-weight="bold">paper</text>
    <text x="798" y="810" fill="#1A1A1A" font-size="9">#f9f5f0</text></g>

  <text x="20" y="850" fill="#665c54" font-size="11">Grays are a distinct hue-locked scale (warm taupe) for borders/disabled/muted text — separate from the bg/paper ramps used for surfaces.</text>
  <text x="20" y="866" fill="#665c54" font-size="11">Values are hand-tuned approximations, not colorimetrically exact — treat as a starting point for CSS variables.</text>
</svg>
